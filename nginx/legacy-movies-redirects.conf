# http context — 301 από παλιά query φίλτρα `/movies?…` σε canonical paths (GSC / εξωτερικά links).
map $arg_venue $movies_legacy_redirect {
    default "";
    ~.+    /movies/venue/$arg_venue;
}

map $arg_section $movies_legacy_section_redirect {
    default "";
    today      /movies/today;
    week       /movies/week;
    summer     /movies/summer;
    new        /movies/new;
    soon       /movies/soon;
}

map $arg_genre $movies_legacy_genre_redirect {
    default "";
    ~.+    /movies/genre/$arg_genre;
}

map $arg_area $movies_legacy_area_redirect {
    default "";
    athens           /movies/area/athens;
    thessaloniki     /movies/area/thessaloniki;
    other            /movies/area/other;
}

# Προτεραιότητα: venue → section → genre → area
map "$movies_legacy_redirect:$movies_legacy_section_redirect:$movies_legacy_genre_redirect:$movies_legacy_area_redirect" $movies_canonical_redirect {
    default "";
    ~^(/movies/venue/[^:]+):     $1;
    ~^:([^:]+):                   $2;
    ~^::([^:]+):                  $3;
    ~^:::([^:]+)                  $4;
}
