upstream app {
    server frontend:80;
}

upstream strapi {
    server strapi:1337;
}

server {
    listen 80;
    server_name www.the37n.gr;
    return 301 https://the37n.gr$request_uri;
}

server {
    listen 80;
    server_name the37n.gr;
    return 301 https://the37n.gr$request_uri;
}

server {
    listen 443 ssl;
    server_name www.the37n.gr;
    ssl_certificate /etc/letsencrypt/live/the37n.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the37n.gr/privkey.pem;
    return 301 https://the37n.gr$request_uri;
}

server {
    listen 443 ssl;
    server_name the37n.gr;

    ssl_certificate /etc/letsencrypt/live/the37n.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the37n.gr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://strapi/admin/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location ^~ /api/ {
        proxy_pass http://strapi/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # proxy_cache απαιτεί buffering (όχι off)
        proxy_buffering on;
        proxy_cache api_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 3m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_bypass $api_cache_guard_bypass;
        proxy_no_cache $api_cache_guard_bypass;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    location /uploads/ {
        proxy_pass http://strapi/uploads/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Admin custom API (Έλεγχος προγράμματος) — όχι static SPA
    location = /sync-program-status {
        proxy_pass http://strapi/sync-program-status;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location ~ ^/(content-manager|content-type-builder|i18n|users-permissions|upload|email|sync-program-status|admin|uploads)(/.*)?$ {
    proxy_pass http://strapi;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering off;
}

    location ~* \.(js|css|woff2|woff|webp|png|jpg|jpeg|gif|svg|ico)$ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}