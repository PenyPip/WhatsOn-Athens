services:
  strapi:
    container_name: whatson-cms-dev
    env_file:
      - ./strapi/.env
    build:
      target: dev
      context: ./strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1337:1337"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./strapi:/cms
      - /cms/node_modules
      - whatson-uploads:/cms/public/uploads
    environment:
      NODE_ENV: development
      PUBLIC_URL: http://localhost:3000
      # Σε dev ο admin ανοιχτός μέσω http://localhost:3000/admin (Next proxy)· παράκατω DATABASE_* επικαλύπτουν το strapi/.env.
      DATABASE_CLIENT: mysql2
      DATABASE_HOST: mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: whatson
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_pass

  mysql:
    container_name: whatson-db-dev
    env_file:
      - .env
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - whatson-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: whatson
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi_pass
      MYSQL_ROOT_PASSWORD: root_pass   
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "strapi", "-pstrapi_pass"]
      interval: 5s
      timeout: 10s
      retries: 12

  frontend:
    container_name: whatson-frontend-dev
    env_file:
      - ./frontend/.env
    build:
      target: dev
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - strapi
    volumes:
      - ./frontend:/front:delegated
      - /front/node_modules
      - /front/.next
    environment:
      NODE_ENV: development
      # Proxy από Next προς Strapi για /admin · /api · /uploads (ίδια λογική με nginx)
      STRAPI_INTERNAL_URL: http://strapi:1337

volumes:
  whatson-data:
  whatson-uploads: