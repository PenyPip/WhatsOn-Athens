services:
  strapi:
    container_name: whatson-cms-dev
    env_file:
      - ./strapi/.env
    build:
      target: dev
      context: ./strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1337:1337"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./strapi:/cms
      - /cms/node_modules
      - whatson-uploads:/cms/public/uploads
    environment:
      NODE_ENV: development
      # Admin + Content Manager API από browser — ίδιο origin με Next proxy (:3000).
      PUBLIC_URL: http://localhost:3000
      STRAPI_ADMIN_BACKEND_URL: http://localhost:3000
      # Σε dev ο admin ανοιχτός μέσω http://localhost:3000/admin (Next proxy)· παράκατω DATABASE_* επικαλύπτουν το strapi/.env.
      DATABASE_CLIENT: mysql2
      DATABASE_HOST: mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: whatson
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_pass
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1337/admin',(r)=>process.exit(r.statusCode!=null&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s

  mysql:
    container_name: whatson-db-dev
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - whatson-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: whatson
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi_pass
      MYSQL_ROOT_PASSWORD: root_pass
    healthcheck:
      # Root ping: πάντα διαθέσιμος μετά την init · ο χρήστης strapi μπορεί να αργεί ή να μη συμφωνεί με παλιό volume.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 75s

  frontend:
    container_name: whatson-frontend-dev
    env_file:
      - ./frontend/.env
    build:
      target: dev
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      strapi:
        condition: service_healthy
    volumes:
      - ./frontend:/front:delegated
      - /front/node_modules
      - frontend-next-dev:/front/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      # Proxy από Next προς Strapi για /admin · /api · /uploads (ίδια λογική με nginx)
      STRAPI_INTERNAL_URL: http://strapi:1337
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{r.resume();process.exit(r.statusCode!=null&&r.statusCode<500?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 120s

volumes:
  whatson-data:
  whatson-uploads:
  frontend-next-dev: