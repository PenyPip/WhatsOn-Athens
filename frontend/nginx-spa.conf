server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/nginx-security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_static on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        text/xml
        font/woff2;

    # Next.js hashed chunks — μακρά cache (657 KiB+ εξοικονόμηση σε επανεπισκέψεις)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "text/plain; charset=utf-8" always;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        charset utf-8;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/xml; charset=utf-8" always;
        try_files /sitemap.xml =404;
    }

    location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires 0;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files $uri =404;
    }

    # Trailing slash → canonical χωρίς slash (το export παράγει `foo.html`, όχι `foo/index.html`).
    # Διορθώνει 404 από εξωτερικά links/Google που προσθέτουν `/` (π.χ. /movies/slug/).
    location ~ ^/(.+)/$ {
        return 301 /$1$is_args$args;
    }

    # SPA: μόνο pre-rendered paths· άγνωστα URLs → 404.html (όχι soft-404 με homepage).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
    }

    error_page 404 /404.html;
    location = /404.html {
        add_header Cache-Control "no-store" always;
        internal;
    }

}
