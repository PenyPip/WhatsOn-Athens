server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/nginx-security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_static on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        text/xml
        font/woff2;

    # Next.js hashed chunks — μακρά cache (657 KiB+ εξοικονόμηση σε επανεπισκέψεις)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires 0;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files $uri =404;
    }

    # SPA: μόνο pre-rendered paths· άγνωστα URLs → 404.html (όχι soft-404 με homepage).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
    }

    error_page 404 /404.html;
    location = /404.html {
        add_header Cache-Control "no-store" always;
        internal;
    }

}
