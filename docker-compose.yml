services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: whatson
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  strapi:
    platform: linux/amd64
    build:
      context: ./strapi
      dockerfile: Dockerfile
      # Production stage (τελευταίο stage — όχι target: dev όπως στο docker-compose.dev.yml)
    ports:
      - "1337:1337"
    depends_on:
      mysql:
        condition: service_healthy
    command: ["npm", "run", "start"]
    environment:
      DATABASE_CLIENT: mysql2
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: whatson
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_pass
      APP_KEYS: key1,key2,key3,key4
      API_TOKEN_SALT: whatson-api-salt
      ADMIN_JWT_SECRET: whatson-admin-jwt
      TRANSFER_TOKEN_SALT: whatson-transfer-salt
      JWT_SECRET: whatson-jwt-secret
      NODE_ENV: production
      ENCRYPTION_KEY: whatson-encryption-key-32chars!!
      NODE_OPTIONS: --max-old-space-size=1024
      MORE_SHOWTIME_SYNC_WORKER: "true"
      # Worker = ξεχωριστό process (Strapi ~300-500MB + sync). 768 ήταν λίγο → OOM. Server έχει RAM.
      MORE_SHOWTIME_SYNC_WORKER_HEAP: "3072"
      MORE_SHOWTIME_SYNC_CONCURRENCY: "1"
      MORE_SHOWTIME_SYNC_DELAY_MS: "300"
      MORE_SHOWTIME_SYNC_EVENTS_CACHE_MAX: "8"
      MORE_SHOWTIME_SYNC_MOVIE_BATCH: "3"
      MORE_SHOWTIME_SYNC_THEATER_BATCH: "3"
      MORE_SHOWTIME_SYNC_START_DELAY_MS: "1000"
      URL: https://the37n.gr
      STRAPI_ADMIN_BACKEND_URL: https://the37n.gr
      PUBLIC_URL: https://the37n.gr
    volumes:
      - strapi_uploads:/app/public/uploads
      - strapi_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1337/admin',r=>process.exit(r.statusCode!=null&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SITE_URL: https://the37n.gr
        SITEMAP_STRAPI_URL: http://host.docker.internal:1337
        SITEMAP_STRICT_MODE: "1"
        NODE_HEAP_MB: "4096"
    ports:
      - "3000:80"
    depends_on:
      strapi:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/00-proxy-cache.conf:/etc/nginx/conf.d/00-proxy-cache.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_api_cache:/var/cache/nginx
      - strapi_uploads:/app/public/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_started
      strapi:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  strapi_uploads:
  strapi_data:
  nginx_api_cache: