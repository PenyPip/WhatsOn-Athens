version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: whatson_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: whatson
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "strapi", "-pstrapi_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    container_name: whatson_strapi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_CLIENT: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: whatson
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_pass
      JWT_SECRET: your-jwt-secret-change-in-production
      ADMIN_JWT_SECRET: your-admin-jwt-secret-change-in-production
      APP_KEYS: key1,key2,key3,key4
      API_TOKEN_SALT: your-api-token-salt
      TRANSFER_TOKEN_SALT: your-transfer-token-salt
      NODE_ENV: production
    ports:
      - "1337:1337"
    volumes:
      - strapi_uploads:/opt/app/public/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatson_frontend
    restart: unless-stopped
    depends_on:
      - strapi
    environment:
      VITE_STRAPI_URL: http://localhost:1337

  nginx:
    image: nginx:alpine
    container_name: whatson_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - strapi
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql_data:
  strapi_uploads:
