services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: whatson
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapi_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "strapi", "-pstrapi_pass"]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    ports:
      - "1337:1337"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_CLIENT: mysql2
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: whatson
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi_pass
      APP_KEYS: key1,key2,key3,key4
      API_TOKEN_SALT: whatson-api-salt
      ADMIN_JWT_SECRET: whatson-admin-jwt
      TRANSFER_TOKEN_SALT: whatson-transfer-salt
      JWT_SECRET: whatson-jwt-secret
      NODE_ENV: production
      ENCRYPTION_KEY: whatson-encryption-key-32chars!!
    volumes:
      - strapi_uploads:/app/public/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - strapi
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - strapi_uploads:/app/public/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - strapi
    restart: unless-stopped

volumes:
  mysql_data:
  strapi_uploads: